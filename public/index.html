<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orb Quest Completer - Puppeteer</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0b1a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e6edf3;
        }
        .container {
            background: #14162b;
            border-radius: 16px;
            padding: 30px;
            width: 500px;
            max-width: 96%;
            border: 1px solid #2a2d4a;
        }
        h1 { text-align:center; font-size:24px; color:#8ea4d2; margin-bottom:20px; }
        .input-group {
            display:flex; gap:8px; margin-bottom:14px;
        }
        .input-group input {
            flex:1; padding:10px 14px; border-radius:8px; border:none;
            background:#1e1f38; color:#fff; font-size:14px;
        }
        .input-group button {
            padding:10px 20px; background:#5865f2; border:none;
            border-radius:8px; color:#fff; font-weight:600; cursor:pointer;
        }
        .input-group button:hover { background:#4752c4; }
        .actions {
            display:flex; gap:8px; margin-bottom:16px;
        }
        .actions button {
            flex:1; padding:10px; border:none; border-radius:8px;
            font-weight:700; cursor:pointer; color:#fff;
        }
        .btn-start { background:#22c55e; }
        .btn-stop { background:#ef4444; }
        .btn-refresh { background:#6b7280; }
        #status {
            text-align:center; margin-bottom:12px; padding:8px;
            border-radius:8px; background:#1a1b33;
        }
        #logs {
            background:#0f1020; padding:12px; border-radius:8px;
            max-height:300px; overflow-y:auto; font-family:monospace;
            font-size:12px; white-space:pre-wrap; word-wrap:break-word;
        }
        #logs::-webkit-scrollbar { width:4px; }
        #logs::-webkit-scrollbar-thumb { background:#3a3c5a; border-radius:4px; }
        .log-line { color:#8a8cab; padding:2px 0; }
        .log-line.success { color:#22c55e; }
        .log-line.error { color:#ef4444; }
        .log-line.info { color:#fbbf24; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Orb Quest Completer</h1>
    <div class="input-group">
        <input type="text" id="tokenInput" placeholder="Nhập token Discord...">
        <button id="runBtn">Chạy</button>
    </div>
    <div id="status">Sẵn sàng</div>
    <div class="actions">
        <button class="btn-stop" id="stopBtn">⏹ Dừng</button>
        <button class="btn-refresh" id="refreshBtn">⟳ Làm mới</button>
    </div>
    <div id="logs">Chưa có log...</div>
</div>

<script>
    const tokenInput = document.getElementById('tokenInput');
    const runBtn = document.getElementById('runBtn');
    const stopBtn = document.getElementById('stopBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusDiv = document.getElementById('status');
    const logsDiv = document.getElementById('logs');

    let isRunning = false;

    async function fetchStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            isRunning = data.running;
            renderLogs(data.logs || []);
            statusDiv.textContent = isRunning ? '🔄 Đang chạy...' : '⏸ Đã dừng';
        } catch (err) {
            statusDiv.textContent = '❌ Lỗi kết nối';
        }
    }

    function renderLogs(logs) {
        if (!logs.length) {
            logsDiv.innerHTML = '<div class="log-line">Chưa có log...</div>';
            return;
        }
        logsDiv.innerHTML = logs.map(l => {
            const cls = l.includes('✅') ? 'success' : (l.includes('❌') ? 'error' : 'info');
            return `<div class="log-line ${cls}">${l}</div>`;
        }).join('');
        logsDiv.scrollTop = logsDiv.scrollHeight;
    }

    runBtn.onclick = async () => {
        const token = tokenInput.value.trim();
        if (!token) return alert('Nhập token');
        try {
            const res = await fetch('/api/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                statusDiv.textContent = '✅ Đang chạy...';
                fetchStatus();
                setInterval(fetchStatus, 3000);
            } else {
                statusDiv.textContent = '❌ Lỗi: ' + data.error;
            }
        } catch (err) {
            statusDiv.textContent = '❌ Lỗi kết nối';
        }
    };

    stopBtn.onclick = async () => {
        await fetch('/api/stop', { method: 'POST' });
        statusDiv.textContent = '⏹ Đã dừng';
        fetchStatus();
    };

    refreshBtn.onclick = fetchStatus;

    fetchStatus();
    setInterval(fetchStatus, 5000);
</script>
</body>
</html>
