<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb Quest Completer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0b1a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e6edf3;
        }
        .container {
            background: #14162b;
            border-radius: 16px;
            padding: 30px;
            width: 540px;
            max-width: 96%;
            border: 1px solid #2a2d4a;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #8ea4d2;
        }
        .token-input {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .token-input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #1e1f38;
            color: white;
            font-size: 14px;
        }
        .token-input input::placeholder { color: #5a5c7a; }
        .token-input button {
            padding: 10px 20px;
            background: #5865f2;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }
        .token-input button:hover { background: #4752c4; }
        #status {
            text-align: center;
            margin-bottom: 14px;
            font-size: 14px;
            padding: 6px;
            border-radius: 8px;
        }
        #status.success { color: #22c55e; background: rgba(34,197,94,0.1); }
        #status.error { color: #ef4444; background: rgba(239,68,68,0.1); }
        #status.info { color: #fbbf24; background: rgba(251,191,36,0.1); }
        .actions {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            color: white;
        }
        .btn-start { background: #22c55e; }
        .btn-start:hover { background: #1a9e4a; }
        .btn-start:disabled { background: #4a6a5a; cursor: not-allowed; }
        .btn-stop { background: #ef4444; }
        .btn-stop:hover { background: #c72e2e; }
        .btn-stop:disabled { background: #6a4a4a; cursor: not-allowed; }
        .btn-refresh { background: #6b7280; }
        .btn-refresh:hover { background: #4b5563; }
        #quest-list {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }
        #quest-list::-webkit-scrollbar { width: 4px; }
        #quest-list::-webkit-scrollbar-thumb { background: #3a3c5a; border-radius: 4px; }
        .quest-item {
            background: #1a1b33;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-left: 4px solid #5865f2;
            transition: .2s;
        }
        .quest-item.completed { border-left-color: #22c55e; opacity: 0.7; }
        .quest-item.running { border-left-color: #fbbf24; }
        .quest-item .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .quest-item .quest-name { font-weight: 600; font-size: 13px; }
        .quest-item .quest-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            background: #2a2c4a;
            color: #a0a3c0;
        }
        .quest-item .quest-progress {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8a8cab;
            margin: 4px 0;
        }
        .quest-item .progress-bar {
            height: 6px;
            background: #1e1f38;
            border-radius: 4px;
            overflow: hidden;
        }
        .quest-item .progress-fill {
            height: 100%;
            background: #5865f2;
            border-radius: 4px;
            transition: width .5s;
        }
        .quest-item.completed .progress-fill { background: #22c55e; }
        .quest-item .quest-status {
            font-size: 11px;
            margin-top: 4px;
        }
        .quest-item .quest-status.running { color: #fbbf24; }
        .quest-item .quest-status.completed { color: #22c55e; }
        .quest-item .quest-status.waiting { color: #8a8cab; }
        .empty-msg {
            text-align: center;
            color: #5a5c7a;
            padding: 30px 0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6a6c8a;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1e1f38;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Orb Quest Completer</h1>
    
    <div class="token-input">
        <input type="text" id="tokenInput" placeholder="Nhập token Discord...">
        <button id="loginBtn">Xác nhận</button>
    </div>
    <div id="status">Vui lòng đăng nhập</div>

    <div class="actions">
        <button class="btn-start" id="startBtn" disabled>▶ Bắt đầu</button>
        <button class="btn-stop" id="stopBtn" disabled>⏹ Dừng</button>
        <button class="btn-refresh" id="refreshBtn">⟳ Làm mới</button>
    </div>

    <div id="quest-list">
        <div class="empty-msg">Đăng nhập để hiển thị quest</div>
    </div>
    
    <div class="stats">
        <span id="questCount">0 quest</span>
        <span id="runningCount">Đang chạy: 0</span>
    </div>
</div>

<script>
    const tokenInput = document.getElementById('tokenInput');
    const loginBtn = document.getElementById('loginBtn');
    const statusDiv = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const questList = document.getElementById('quest-list');
    const questCount = document.getElementById('questCount');
    const runningCount = document.getElementById('runningCount');

    let isRunning = false;

    async function fetchQuests() {
        try {
            const res = await fetch('/api/quests');
            if (!res.ok) throw new Error('Not logged in');
            const data = await res.json();
            renderQuests(data.quests || []);
        } catch (err) {
            questList.innerHTML = `<div class="empty-msg">${err.message}</div>`;
        }
    }

    function renderQuests(quests) {
        if (!quests || quests.length === 0) {
            questList.innerHTML = `<div class="empty-msg">Không có quest nào đang chờ</div>`;
            questCount.textContent = '0 quest';
            runningCount.textContent = 'Đang chạy: 0';
            return;
        }
        
        let html = '';
        let running = 0;
        let completed = 0;
        
        quests.forEach(q => {
            const pct = q.needed > 0 ? Math.min(100, Math.round((q.done / q.needed) * 100)) : 0;
            const statusClass = q.completed ? 'completed' : (q.running ? 'running' : '');
            const statusText = q.completed ? '✅ Đã hoàn thành' : (q.running ? '🔄 Đang chạy...' : '⏳ Chờ xử lý');
            
            if (q.running) running++;
            if (q.completed) completed++;
            
            html += `
                <div class="quest-item ${statusClass}">
                    <div class="quest-header">
                        <span class="quest-name">${q.name}</span>
                        <span class="quest-badge">${q.task}</span>
                    </div>
                    <div class="quest-progress">
                        <span>${q.done}s / ${q.needed}s</span>
                        <span>${pct}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${pct}%"></div>
                    </div>
                    <div class="quest-status ${statusClass || 'waiting'}">${statusText}</div>
                </div>
            `;
        });
        
        questList.innerHTML = html;
        questCount.textContent = `${quests.length} quest (${completed} hoàn thành)`;
        runningCount.textContent = `Đang chạy: ${running}`;
        
        startBtn.disabled = isRunning || quests.every(q => q.completed);
        stopBtn.disabled = !isRunning && running === 0;
    }

    loginBtn.onclick = async () => {
        const token = tokenInput.value.trim();
        if (!token) {
            setStatus('Vui lòng nhập token', 'error');
            return;
        }
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                setStatus(`✅ Đã đăng nhập: ${data.username}`, 'success');
                startBtn.disabled = false;
                stopBtn.disabled = true;
                await fetchQuests();
            } else {
                setStatus('❌ Token không hợp lệ', 'error');
            }
        } catch (err) {
            setStatus('❌ Lỗi kết nối server', 'error');
        }
    };

    startBtn.onclick = async () => {
        try {
            const res = await fetch('/api/start', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                isRunning = true;
                setStatus('🔄 Đang chạy... Vui lòng đợi', 'info');
                startBtn.disabled = true;
                stopBtn.disabled = false;
                await fetchQuests();
                
                // Tự động refresh mỗi 3s
                const interval = setInterval(async () => {
                    await fetchQuests();
                    const isDone = document.querySelector('.quest-item:not(.completed)') === null;
                    if (isDone) {
                        clearInterval(interval);
                        isRunning = false;
                        setStatus('✅ Đã hoàn thành tất cả quest!', 'success');
                        startBtn.disabled = false;
                        stopBtn.disabled = true;
                    }
                }, 3000);
            }
        } catch (err) {
            setStatus('❌ Lỗi khi bắt đầu', 'error');
        }
    };

    stopBtn.onclick = async () => {
        try {
            await fetch('/api/stop', { method: 'POST' });
            isRunning = false;
            setStatus('⏹ Đã dừng', 'info');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            await fetchQuests();
        } catch (err) {
            setStatus('❌ Lỗi khi dừng', 'error');
        }
    };

    refreshBtn.onclick = fetchQuests;

    function setStatus(msg, type = 'info') {
        statusDiv.textContent = msg;
        statusDiv.className = type;
    }

    // Auto refresh mỗi 10s
    setInterval(fetchQuests, 10000);
</script>
</body>
</html>
